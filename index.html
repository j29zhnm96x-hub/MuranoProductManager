<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Murano Product Manager</title>
  <link rel="icon" type="image/png" sizes="180x180" href="./assets/MPMLogo180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/MPMLogo180.png" />
  <meta name="theme-color" content="#0ea5e9" />
  <!-- Minimal, responsive CSS -->
  <link rel="stylesheet" href="./styles.css" />
  <!-- App logic -->
  <script src="./app.js" defer></script>
</head>
<body>
  <!-- Top Bar -->
  <div id="top-bar">
    <div class="left">
      <div id="sync-status" data-i18n-title="Cloud sync status" data-i18n="Offline">Offline</div>
      <button id="save-btn" data-i18n-title="Save state" type="button" style="width:36px;height:36px;padding:0;border-radius:8px;border:1px solid #fca5a5;background:#fee2e2;color:#dc2626;font-size:16px;line-height:1;display:grid;place-items:center;cursor:pointer;">💾</button>
      <button id="actions-btn" class="btn-save" data-i18n-title="Actions" type="button" data-i18n="Actions">Actions</button>
      <button id="add-btn" data-i18n-title="Add folder or product">+</button>
    </div>
    <div class="center">
      <div id="search-bar">
        <input id="search-input" type="text" placeholder="Search products..." data-i18n="Search" data-i18n-type="placeholder" />
        <div id="search-results" class="dropdown hidden"></div>
      </div>
    </div>
    <div class="mid-right"></div>
    <div class="right">
      <button id="shop-btn" class="btn-shop" type="button" title="Shop/Prodaja">Prodaja</button>
      <button id="settings-btn" data-i18n-title="Settings" type="button"><img src="./assets/setting.png" alt="Settings" class="icon"/></button>
    </div>
  </div>

  <!-- Refresh overlay -->
  <div id="refresh-overlay" aria-live="assertive" data-i18n-aria="Refreshing to latest version">
    <div class="box" data-i18n="Refreshing to latest version">New version found, refreshing...</div>
  </div>

  <!-- Product Detail Page (overlay) -->
  <div id="product-page" class="hidden" data-i18n-aria="Product detail">
    <div class="pp-header">
      <div class="pp-left">
        <button id="pp-back" class="pp-back" type="button">← <span data-i18n="Back">Back</span></button>
        <button id="pp-edit" class="pp-edit" data-i18n-title="Edit details" type="button" data-i18n="Edit">Edit</button>
      </div>
      <div id="pp-title" class="pp-title"></div>
    </div>
    <div class="pp-content">
      <div class="pp-card">
        <div class="pp-card-title" data-i18n="Product Information">Product Information</div>
        <div class="pp-info-grid">
          <div class="pp-row"><div class="pp-label" data-i18n="Name">Name</div><div class="pp-value" id="pp-name"></div></div>
          <div class="pp-row"><div class="pp-label" data-i18n="Quantity">Quantity</div><div class="pp-value" id="pp-qty"></div></div>
          <div class="pp-row"><div class="pp-label" data-i18n="Price">Price</div><div class="pp-value" id="pp-price"></div></div>
          <div class="pp-row"><div class="pp-label" data-i18n="Total Value">Total Value</div><div class="pp-value" id="pp-total"></div></div>
          <div class="pp-row"><div class="pp-label" data-i18n="Target Quantity">Target Quantity</div><div class="pp-value" id="pp-target"></div></div>
        </div>
      </div>

      <div class="pp-card">
        <div class="pp-adjust">
          <div class="pp-adjust-label" data-i18n="Adjust Quantity">Adjust Quantity</div>
            <input id="pp-adjust-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" value="" />
            <button id="pp-add-btn" type="button" data-i18n="Add">Add</button>
            <button id="pp-correct-btn" class="danger" type="button" style="margin-left: auto" data-i18n="Correct">Ispravak</button>
        </div>
      </div>

      <div class="pp-card">
        <div class="pp-card-title" data-i18n="Image">Image</div>
        <div class="pp-image">
          <img id="pp-image-preview" alt="product" class="pp-image-preview hidden" />
          <button id="pp-upload-btn" type="button" data-i18n="Upload Image">Upload Image</button>
          <input id="pp-image-file" type="file" accept="image/*" class="hidden" />
        </div>
      </div>

      <div class="pp-card">
        <div class="pp-card-title" data-i18n="Note">Note</div>
        <div class="pp-note">
          <textarea id="pp-note" rows="1" placeholder="Add a note…" data-i18n="Add a note..." data-i18n-type="placeholder"></textarea>
          <div class="pp-note-actions"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- History Page (overlay) -->
  <div id="history-page" class="hidden" data-i18n-aria="Inventory history">
    <div class="history-header">
      <div class="history-left">
        <button id="history-back" class="history-back" type="button" data-i18n="Back">Back</button>
      </div>
      <div class="history-title" data-i18n="Stock History">Inventory History</div>
      <button id="history-totop" class="history-totop" type="button" data-i18n="Top">Top</button>
    </div>
    <div class="history-content">
      <div class="history-toolbar">
        <div id="history-summary" class="history-summary"></div>
        <div class="history-controls">
          <div class="history-controls-line1">
            <div class="history-search-wrap">
              <input id="history-search" type="text" placeholder="Search product, event or note..." autocomplete="off" data-i18n="Search product, event or note..." data-i18n-type="placeholder" />
            </div>
          </div>
          <div class="history-controls-line2">
            <div class="history-date-wrap">
              <span id="history-date-text"></span>
              <input id="history-date" type="date" class="history-date-input-hidden" />
            </div>
            <div class="history-date-wrap collapsed" id="history-date-to-wrap">
              <span id="history-date-to-text"></span>
              <input id="history-date-to" type="date" />
            </div>
            <button id="history-today" type="button" class="history-ctrl-btn" data-i18n="Today">Today</button>
            <button id="history-clear-date" type="button" class="history-ctrl-btn secondary" data-i18n="All dates">All dates</button>
            <button id="history-period-range" type="button" class="history-ctrl-btn">Odaberi period</button>
            <span class="history-ctrl-divider">|</span>
            <button id="history-period-day" type="button" class="history-ctrl-btn active" data-i18n="Day">Day</button>
            <button id="history-period-week" type="button" class="history-ctrl-btn" data-i18n="Week">Week</button>
            <button id="history-period-month" type="button" class="history-ctrl-btn" data-i18n="Month">Month</button>
            <span class="history-ctrl-divider">|</span>
            <button id="history-prev-period" type="button" class="history-ctrl-btn secondary">&#9664;</button>
            <button id="history-next-period" type="button" class="history-ctrl-btn secondary">&#9654;</button>
          </div>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <!-- Breadcrumbs -->
  <div id="breadcrumb-line">
    <div id="breadcrumbs"></div>
    <button id="search-toggle" class="breadcrumb-search" data-i18n-title="Search" type="button"><img src="./assets/magnifying-glass.png" alt="Search" class="icon"/></button>
  </div>

  <!-- Stats Bar -->
  <div id="stats-bar" data-i18n-aria="Overall stats"></div>

  <!-- Main Content -->
  <div id="main">
    <div id="folder-list" data-i18n-aria="Folder and product tree"></div>
    <div id="priority-graph" data-i18n-aria="Priority products progress"></div>
    
    <div id="editor-panel" class="hidden" data-i18n-aria="Editor panel">
      <div class="editor-header">
        <span id="editor-title" data-i18n="Editor">Editor</span>
        <button id="editor-close" data-i18n-title="Close">✕</button>
      </div>
      <form id="editor-form">
        <!-- Common fields -->
        <input type="hidden" id="editor-entity-id" />
        <input type="hidden" id="editor-entity-type" />

        <label>
          <span data-i18n="Name">Name</span>
          <input id="editor-name" type="text" required />
        </label>

        <!-- Product-only fields -->
        <div id="product-fields" class="hidden">
          <label>
            <span data-i18n="Price">Price</span>
            <input id="editor-price" type="number" min="0" step="0.01" />
          </label>
          <label>
            <span data-i18n="Target Quantity">Target Quantity</span>
            <input id="editor-target" type="number" min="0" step="1" />
          </label>
          <label>
            <span data-i18n="Quantity">Quantity</span>
            <input id="editor-quantity" type="number" min="0" step="1" />
          </label>
          <label>
            <span data-i18n="Priority product">Priority product</span>
            <input id="editor-priority" type="checkbox" />
          </label>
          <label>
            <span data-i18n="Max Quantity (guideline)">Max Quantity (guideline)</span>
            <input id="editor-maxqty" type="number" min="0" step="1" />
          </label>
          <label>
            <span>Kategorija prodaje</span>
            <select id="editor-shopcategory"><option value="">--</option></select>
          </label>

          <div class="custom-fields">
            <div class="custom-fields-header">
              <span data-i18n="Custom fields">Custom fields</span>
              <button type="button" id="add-custom-field" data-i18n="+ Field">+ Field</button>
            </div>
            <div id="custom-fields-container"></div>
          </div>
        </div>

        <!-- Folder-only fields -->
        <div id="folder-fields" class="hidden">
          <label>
            <span data-i18n="Image">Image</span>
            <input id="editor-image" type="file" accept="image/*" />
          </label>
          <div class="image-preview hidden" id="folder-image-preview"></div>
        </div>

        <div class="editor-actions">
          <button type="submit" id="save-entity" data-i18n="Save">Save</button>
          <button type="button" id="delete-entity" class="danger" data-i18n="Delete">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Shop Page (overlay) -->
  <div id="shop-page" class="hidden">
    <div class="shop-header">
      <div class="shop-left">
        <button id="shop-back" class="shop-back" type="button">← <span data-i18n="Back">Back</span></button>
      </div>
      <div class="shop-title">Prodaja</div>
      <button id="shop-akcije-btn" class="shop-akcije-btn" type="button">Akcije</button>
    </div>
    <div class="shop-content">
      <div class="shop-inv-header">
        <span class="shop-inv-title">Trenutno u prodaji</span>
      </div>
      <div id="shop-inventory" class="shop-inventory"></div>
      <div id="shop-pending" class="shop-pending hidden">
        <div class="shop-pending-header">
          <span class="shop-pending-title">Čeka potvrdu</span>
          <span id="shop-pending-count" class="shop-pending-count">0</span>
        </div>
        <div id="shop-pending-list" class="shop-pending-list"></div>
        <div class="shop-pending-actions">
          <button id="shop-confirm-btn" class="shop-action-btn primary" type="button">Potvrdi sve</button>
          <button id="shop-decline-selected-btn" class="shop-action-btn" type="button">Odustani od ozna\u010Denih</button>
          <button id="shop-decline-btn" class="shop-action-btn danger" type="button">Odustani od svega</button>
        </div>
      </div>
    </div>
  </div>

  <!-- On-Site Production Page (overlay) -->
  <div id="onsite-page" class="hidden">
    <div class="onsite-header">
      <div class="onsite-left">
        <button id="onsite-back" class="onsite-back" type="button">← <span data-i18n="Back">Back</span></button>
      </div>
      <div class="onsite-title">Proizvodnja na licu mjesta</div>
      <div class="onsite-actions-placeholder"></div>
    </div>
    <div class="onsite-content">
      <div id="onsite-list" class="onsite-list"></div>
      <div class="onsite-add-row">
        <button id="onsite-select-btn" class="onsite-select-btn" type="button">Odaberi proizvod</button>
        <span id="onsite-selected-name" class="onsite-selected-name"></span>
        <input id="onsite-qty" class="onsite-qty" type="number" min="1" step="1" value="1" />
        <button id="onsite-add-btn" class="onsite-add-btn" type="button">Dodaj</button>
      </div>
      <div class="onsite-actions">
        <button id="onsite-confirm-btn" class="shop-action-btn primary" type="button">Potvrdi sve</button>
        <button id="onsite-decline-btn" class="shop-action-btn danger" type="button">Odustani od unosa</button>
      </div>
    </div>
  </div>

  <!-- Document Preview (PDF overlay) -->
  <div id="doc-preview" class="hidden">
    <div class="doc-preview-header">
      <button id="doc-preview-back" type="button">← <span data-i18n="Back">Back</span></button>
      <span class="doc-preview-title">Pregled dokumenta</span>
      <div class="doc-preview-actions">
        <button id="doc-actions-btn" type="button">Akcije</button>
      </div>
    </div>
    <div id="doc-preview-body" class="doc-preview-body"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-title" data-i18n="Confirm">Confirm</span>
        <button id="modal-close">✕</button>
      </div>
      <div id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Hidden import input -->
  <input id="import-file" type="file" accept="application/json" class="hidden" />

  <!-- Service worker registration at end of body for reliability -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').then((reg) => {
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available — activate immediately
                newSW.postMessage({ action: 'skipWaiting' });
              }
            });
          });
        }).catch(() => {/* no-op */});
      });
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
